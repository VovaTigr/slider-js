<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #slider {
            width: calc(1920px / 2);
            filter: saturate(10px);
            box-shadow: 5px 5px 10px black;
        }

        div {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #buttonDiv, #buttonDiv2 {
            display: inline-block;
            margin: 15px;
        }

        .but {
            width: 50px;
            height: 30px;
            font-size: 20px;
        }

        #buttonAuto, #buttonStop {
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Slider</h1>
        <img src="images/1.jpg" alt="" id="slider"><br>
        <div id="buttonDiv">
            <button id="buttonPrev" onclick="prev()" class="but">&lt;</button>
            <button id="buttonNext" onclick="next()" class="but">&gt;</button>
        </div> 
        <div id="buttonDiv2">
            <button id="buttonAuto" onclick="automatic()" class="but">Auto</button>
            <button id="buttonStop" onclick="stop()" class="but">Stop</button>
        </div>    
    </div>
    <script src="script.js"></script>
</body>
</html>
